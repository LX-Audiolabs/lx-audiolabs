name: Bug Report
description: Something not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: plugin
    attributes:
      label: Plugin
      description: Which plugin has the bug?
      placeholder: e.g. Equilibrium
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin Version
      placeholder: e.g. 1.4.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host / DAW
      description: Which CLAP host did you test in?
      placeholder: e.g. Bitwig Studio 5, REAPER 7
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Load plugin in host
        2. Adjust parameter X
        3. Observe Y
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, audio samples, log output — anything helpful.
