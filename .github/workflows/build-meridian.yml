name: Build Meridian (CI)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-meridian-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-meridian-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce

      - name: Build Meridian
        run: cargo truce build --clap -p meridian

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(grep '^version' plugins/meridian/Cargo.toml | head -1 | sed 's/.*\"\(.*\)\"/\1/')" >> $GITHUB_OUTPUT

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp -r target/bundles/Meridian.clap dist/
          echo "Meridian v${{ steps.version.outputs.version }} — ${{ runner.os }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\bundles\Meridian.clap dist\
          Write-Host "Meridian v${{ steps.version.outputs.version }} — Windows"

      - uses: actions/upload-artifact@v6
        with:
          name: Meridian-v${{ steps.version.outputs.version }}-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/
          if-no-files-found: error
