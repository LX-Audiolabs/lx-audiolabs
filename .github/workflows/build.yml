name: Build CLAP Plugins (truce)

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: linux-truce-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-truce-
      - name: Install build dependencies
        run: |
          sudo apt-get update -y || sudo apt-get update -y || true
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev
      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce
      - name: Build all plugins (CLAP)
        run: cargo truce build --clap
      - name: Bundle artifacts
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/bundles/*.clap target/bundled/
          echo "Built CLAP bundles:"
          ls -la target/bundled/
      - uses: actions/upload-artifact@v5
        with:
          name: clap-plugins-linux
          path: target/bundled/*.clap
          if-no-files-found: error

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry\index
            ~\.cargo\registry\cache
            ~\.cargo\git\db
            target\
          key: windows-truce-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-truce-
      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce
      - name: Build all plugins (CLAP)
        run: cargo truce build --clap
      - name: Bundle artifacts
        shell: pwsh
        run: |
          if (Test-Path target\bundled) {
            Remove-Item -Path target\bundled -Recurse -Force -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Force -Path target\bundled | Out-Null
          Copy-Item target\bundles\*.clap target\bundled\
          Write-Host "Built CLAP bundles:"
          Get-ChildItem target\bundled\
      - uses: actions/upload-artifact@v5
        with:
          name: clap-plugins-win
          path: target\bundled\*.clap
          if-no-files-found: error
