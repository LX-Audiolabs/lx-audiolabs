name: Build All Plugins

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: linux-all-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-all-
      - name: Install build dependencies
        run: |
          sudo apt-get update -y || sudo apt-get update -y || true
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev
      - name: Build all plugins
        run: cargo build --release -p aether -p aurum -p equilibrium -p lucent -p lucent-relay -p meridian
      - name: Read versions
        id: version
        run: |
          echo "aether=$(grep '^version' plugins/aether/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "aurum=$(grep '^version' plugins/aurum/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "equilibrium=$(grep '^version' plugins/equilibrium/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "lucent=$(grep '^version' plugins/lucent/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "meridian=$(grep '^version' plugins/meridian/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
      - name: Bundle CLAPs
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libaether.so target/bundled/Aether.clap
          cp target/release/libaurum.so target/bundled/Aurum.clap
          cp target/release/libequilibrium.so target/bundled/Equilibrium.clap
          cp target/release/liblucent.so target/bundled/Lucent.clap
          cp target/release/liblucent_relay.so target/bundled/Lucent-Relay.clap
          cp target/release/libmeridian.so target/bundled/Meridian.clap
          echo "✓ Created: $(ls target/bundled/*.clap | wc -l) CLAPs"
      - name: Create ZIP archives
        run: |
          mkdir -p release
          cd target/bundled
          zip -j ../../release/Aether-v${{ steps.version.outputs.aether }}-linux.zip Aether.clap
          zip -j ../../release/Aurum-v${{ steps.version.outputs.aurum }}-linux.zip Aurum.clap
          zip -j ../../release/Equilibrium-v${{ steps.version.outputs.equilibrium }}-linux.zip Equilibrium.clap
          zip -j ../../release/Lucent-v${{ steps.version.outputs.lucent }}-linux.zip Lucent.clap
          zip -j ../../release/Lucent-Relay-v${{ steps.version.outputs.lucent }}-linux.zip Lucent-Relay.clap
          zip -j ../../release/Meridian-v${{ steps.version.outputs.meridian }}-linux.zip Meridian.clap
      - uses: actions/upload-artifact@v6
        with:
          name: aether-v${{ steps.version.outputs.aether }}-linux
          path: release/Aether-v${{ steps.version.outputs.aether }}-linux.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: aurum-v${{ steps.version.outputs.aurum }}-linux
          path: release/Aurum-v${{ steps.version.outputs.aurum }}-linux.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: equilibrium-v${{ steps.version.outputs.equilibrium }}-linux
          path: release/Equilibrium-v${{ steps.version.outputs.equilibrium }}-linux.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: lucent-v${{ steps.version.outputs.lucent }}-linux
          path: release/Lucent-v${{ steps.version.outputs.lucent }}-linux.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: lucent-relay-v${{ steps.version.outputs.lucent }}-linux
          path: release/Lucent-Relay-v${{ steps.version.outputs.lucent }}-linux.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: meridian-v${{ steps.version.outputs.meridian }}-linux
          path: release/Meridian-v${{ steps.version.outputs.meridian }}-linux.zip
          if-no-files-found: error
