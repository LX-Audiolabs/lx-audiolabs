name: Build All Plugins

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-all-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-all-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce

      - name: Build all plugins
        run: cargo truce build --clap

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/aether dist/aurum dist/lucent-bundle dist/equilibrium dist/meridian
          cp -r target/bundles/Aether.clap dist/aether/
          cp -r target/bundles/Aurum.clap dist/aurum/
          cp -r "target/bundles/Lucent.clap" "target/bundles/Lucent Relay.clap" dist/lucent-bundle/
          cp -r target/bundles/Equilibrium.clap dist/equilibrium/
          cp -r target/bundles/Meridian.clap dist/meridian/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\aether, dist\aurum, dist\lucent-bundle, dist\equilibrium, dist\meridian | Out-Null
          Copy-Item target\bundles\Aether.clap dist\aether\
          Copy-Item target\bundles\Aurum.clap dist\aurum\
          Copy-Item 'target\bundles\Lucent.clap', 'target\bundles\Lucent Relay.clap' dist\lucent-bundle\
          Copy-Item target\bundles\Equilibrium.clap dist\equilibrium\
          Copy-Item target\bundles\Meridian.clap dist\meridian\

      - uses: actions/upload-artifact@v6
        with:
          name: aether-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/aether/
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: aurum-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/aurum/
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: lucent-bundle-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/lucent-bundle/
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: equilibrium-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/equilibrium/
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: meridian-${{ runner.os == 'Linux' && 'linux' || (runner.os == 'macOS' && 'mac' || 'win') }}
          path: dist/meridian/
          if-no-files-found: error
