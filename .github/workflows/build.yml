name: Build All Plugins

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: linux-all-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-all-
      - name: Install build dependencies
        run: |
          sudo apt-get update -y || sudo apt-get update -y || true
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev
      - name: Build all plugins
        run: cargo build --release -p aether -p aurum -p equilibrium -p lucent -p lucent-relay -p meridian
      - name: Bundle CLAPs
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libaether.so target/bundled/aether-linux.clap
          cp target/release/libaurum.so target/bundled/aurum-linux.clap
          cp target/release/libequilibrium.so target/bundled/equilibrium-linux.clap
          cp target/release/liblucent.so target/bundled/lucent-linux.clap
          cp target/release/liblucent_relay.so target/bundled/lucent-relay-linux.clap
          cp target/release/libmeridian.so target/bundled/meridian-linux.clap
          echo "✓ Created: $(ls target/bundled/*.clap | wc -l) CLAPs"
      - uses: actions/upload-artifact@v5
        with:
          name: all-plugins-linux
          path: target/bundled/*.clap
          if-no-files-found: error
