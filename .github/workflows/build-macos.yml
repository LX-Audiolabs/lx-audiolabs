name: Build All Plugins (macOS)

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: macos-all-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-all-
      - name: Build all plugins
        run: cargo build --release -p aether -p aurum -p equilibrium -p lucent -p lucent-relay -p meridian
      - name: Read versions
        id: version
        run: |
          echo "aether=$(grep '^version' plugins/aether/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "aurum=$(grep '^version' plugins/aurum/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "equilibrium=$(grep '^version' plugins/equilibrium/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "lucent=$(grep '^version' plugins/lucent/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
          echo "meridian=$(grep '^version' plugins/meridian/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
      - name: Bundle CLAPs
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libaether.dylib target/bundled/Aether.clap
          cp target/release/libaurum.dylib target/bundled/Aurum.clap
          cp target/release/libequilibrium.dylib target/bundled/Equilibrium.clap
          cp target/release/liblucent.dylib target/bundled/Lucent.clap
          cp target/release/liblucent_relay.dylib target/bundled/Lucent-Relay.clap
          cp target/release/libmeridian.dylib target/bundled/Meridian.clap
          echo "✓ Created: $(ls target/bundled/*.clap | wc -l) CLAPs"
      - name: Create ZIP archives
        run: |
          mkdir -p release
          cd target/bundled
          zip -j ../../release/Aether-v${{ steps.version.outputs.aether }}-mac.zip Aether.clap
          zip -j ../../release/Aurum-v${{ steps.version.outputs.aurum }}-mac.zip Aurum.clap
          zip -j ../../release/Equilibrium-v${{ steps.version.outputs.equilibrium }}-mac.zip Equilibrium.clap
          zip -j ../../release/Lucent-v${{ steps.version.outputs.lucent }}-mac.zip Lucent.clap
          zip -j ../../release/Lucent-Relay-v${{ steps.version.outputs.lucent }}-mac.zip Lucent-Relay.clap
          zip -j ../../release/Meridian-v${{ steps.version.outputs.meridian }}-mac.zip Meridian.clap
      - uses: actions/upload-artifact@v6
        with:
          name: aether-v${{ steps.version.outputs.aether }}-mac
          path: release/Aether-v${{ steps.version.outputs.aether }}-mac.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: aurum-v${{ steps.version.outputs.aurum }}-mac
          path: release/Aurum-v${{ steps.version.outputs.aurum }}-mac.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: equilibrium-v${{ steps.version.outputs.equilibrium }}-mac
          path: release/Equilibrium-v${{ steps.version.outputs.equilibrium }}-mac.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: lucent-v${{ steps.version.outputs.lucent }}-mac
          path: release/Lucent-v${{ steps.version.outputs.lucent }}-mac.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: lucent-relay-v${{ steps.version.outputs.lucent }}-mac
          path: release/Lucent-Relay-v${{ steps.version.outputs.lucent }}-mac.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: meridian-v${{ steps.version.outputs.meridian }}-mac
          path: release/Meridian-v${{ steps.version.outputs.meridian }}-mac.zip
          if-no-files-found: error
