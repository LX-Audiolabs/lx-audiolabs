name: Build Equilibrium (CI)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-equilibrium-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-equilibrium-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce

      - name: Build Equilibrium
        run: cargo truce build --clap -p equilibrium

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(grep '^version' plugins/equilibrium/Cargo.toml | head -1 | sed 's/.*\"\(.*\)\"/\1/')" >> $GITHUB_OUTPUT

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/bundles/Equilibrium.clap dist/
          echo "Equilibrium v${{ steps.version.outputs.version }} — Linux"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\bundles\Equilibrium.clap dist\
          Write-Host "Equilibrium v${{ steps.version.outputs.version }} — Windows"

      - uses: actions/upload-artifact@v5
        with:
          name: Equilibrium-v${{ steps.version.outputs.version }}-${{ runner.os == 'Linux' && 'linux' || 'win' }}
          path: dist/
          if-no-files-found: error
