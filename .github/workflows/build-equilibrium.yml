name: Build Equilibrium

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: linux-equilibrium-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-equilibrium-
      - name: Install build dependencies
        run: |
          sudo apt-get update -y || sudo apt-get update -y || true
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev
      - name: Build Equilibrium
        run: cargo build --release --package equilibrium
      - name: Bundle CLAP
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libequilibrium.so target/bundled/equilibrium.clap
          echo "✓ Created: equilibrium.clap"
      - uses: actions/upload-artifact@v6
        with:
          name: equilibrium-linux
          path: target/bundled/*.clap
          if-no-files-found: error
