name: Build Aurum

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'aurum/**'
      - 'shared-dsp/**'
      - 'shared-analysis/**'
      - 'shared-ui/**'
      - 'shared-vault/**'
      - 'truce.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-aurum-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-aurum-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce

      - name: Build Aurum
        run: cargo truce build --clap -p aurum

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/bundles/Aurum.clap dist/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\bundles\Aurum.clap dist\

      - uses: actions/upload-artifact@v5
        with:
          name: Aurum-${{ runner.os == 'Linux' && 'linux' || 'win' }}
          path: dist/
          if-no-files-found: error
