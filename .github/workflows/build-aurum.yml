name: Build Aurum

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: linux-aurum-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-aurum-
      - name: Install build dependencies
        run: |
          sudo apt-get update -y || sudo apt-get update -y || true
          sudo apt-get install -y \
            pkg-config \
            libfreetype6-dev \
            libfontconfig1-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl-dev \
            libgl-dev
      - name: Build Aurum
        run: cargo build --release --package aurum
      - name: Read version
        id: version
        run: echo "version=$(grep '^version' plugins/aurum/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
      - name: Bundle CLAP
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libaurum.so target/bundled/aurum.clap
          echo "✓ Created: aurum.clap"
      - uses: actions/upload-artifact@v6
        with:
          name: aurum-v${{ steps.version.outputs.version }}-linux
          path: target/bundled/*.clap
          if-no-files-found: error

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: macos-aurum-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-aurum-
      - name: Build Aurum
        run: cargo build --release --package aurum
      - name: Read version
        id: version
        run: echo "version=$(grep '^version' plugins/aurum/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT
      - name: Bundle CLAP
        run: |
          rm -rf target/bundled
          mkdir -p target/bundled
          cp target/release/libaurum.dylib target/bundled/aurum.clap
          echo "✓ Created: aurum.clap"
      - uses: actions/upload-artifact@v6
        with:
          name: aurum-v${{ steps.version.outputs.version }}-macos
          path: target/bundled/*.clap
          if-no-files-found: error
