name: Build Lucent Bundle

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'plugins/lucent/**'
      - 'plugins/lucent-relay/**'
      - 'shm-hub/**'
      - 'shared-dsp/**'
      - 'shared-analysis/**'
      - 'shared-ui/**'
      - 'shared-vault/**'
      - 'truce.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-lucent-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lucent-

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxcursor-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev libegl-dev libgl-dev

      - name: Install cargo-truce
        run: cargo install --git https://github.com/truce-audio/truce cargo-truce

      - name: Build Lucent + Relay
        run: cargo truce build --clap -p lucent -p lucent-relay

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp "target/bundles/Lucent.clap" "target/bundles/Lucent Relay.clap" dist/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item 'target\bundles\Lucent.clap', 'target\bundles\Lucent Relay.clap' dist\

      - uses: actions/upload-artifact@v5
        with:
          name: Lucent-Bundle-${{ runner.os == 'Linux' && 'linux' || 'win' }}
          path: dist/
          if-no-files-found: error
