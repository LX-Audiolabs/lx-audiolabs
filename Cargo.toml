[workspace]
members = [
    "shared-dsp",
    "shared-analysis",
    "shared-vault",
    "shared-ui",
    "shm-hub",
    "plugins/lucent",
    "plugins/lucent-relay",
    "plugins/aether",
    "plugins/aurum",
    "plugins/equilibrium",
    "plugins/meridian",
]
resolver = "3"

[workspace.dependencies]
truce           = { git = "https://github.com/LX-Audiolabs/truce", branch = "main", default-features = false }
truce-core      = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-params    = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-clap      = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-vst3      = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-lv2       = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-loader    = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-test      = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
truce-vizia     = { git = "https://github.com/LX-Audiolabs/truce", branch = "main" }
clap-sys        = "0.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.shell]
inherits = "release"

[profile.dbg]
inherits = "release"
strip = false
debug = "full"

[patch.crates-io]
# baseview-truce-local removed — no longer in dependency graph
# (was for truce-egui/truce-iced stack, which we no longer use).

[patch."https://github.com/truce-audio/truce"]
# All truce crates come from the lxndrbe/truce fork (v6.1.4 with local patches).
# truce-gui / truce-gpu local vendors removed — no plugin uses them anymore.

[patch."https://github.com/vizia/baseview.git"]
# DPI-Guard: SetProcessDpiAwarenessContext only for top-level windows,
# never for embedded WS_CHILD (plugin) windows. Prevents host hang/crash
# on repeated editor open-close cycles.
baseview = { path = "baseview-local" }
