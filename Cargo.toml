[workspace]
members = [
    "shared-dsp",
    "shared-analysis",
    "shared-vault",
    "shared-ui",
    "shm-hub",
    "plugins/lucent",
    "plugins/lucent-relay",
    "plugins/aether",
    "plugins/aurum",
    "plugins/equilibrium",
    "plugins/meridian",
]
resolver = "3"

[workspace.dependencies]
truce           = { version = "3.1.2", default-features = false }
truce-core      = "3.1.2"
truce-params    = "3.1.2"
truce-clap      = "3.1.2"
truce-vst3      = "3.1.2"
truce-loader    = "3.1.2"
truce-test      = "3.1.2"
clap-sys        = "0.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.shell]
inherits = "release"

# Debug-symbol preserving variant of the release profile, used for
# Windows crash analysis when full symbols are needed.
[profile.dbg]
inherits = "release"
strip = false
debug = "full"

[patch.crates-io]
truce-clap = { path = "truce-clap-local" }
# Pin truce-params/truce-core to the same git tag truce-vizia uses so
# Cargo resolves a single source and the `Params` trait is unified across
# all workspace crates.
truce-params = { git = "https://github.com/truce-audio/truce", tag = "v3.1.2" }
truce-core = { git = "https://github.com/truce-audio/truce", tag = "v3.1.2" }

# Local forks of baseview and truce-gui/truce-gpu that carry small
# Windows-specific fixes (DPI awareness and wgpu GL fallback) until the
# changes land upstream.
[patch."https://github.com/truce-audio/truce"]
truce-gui = { path = "truce-local/truce-gui" }
truce-gpu = { path = "truce-local/truce-gpu" }

[patch."https://github.com/vizia/baseview.git"]
baseview = { path = "baseview-local" }

# Local vizia fork carrying a timer-handling fix until it is accepted
# upstream. The full workspace is vendored because vizia's sibling crates
# reference each other via relative paths.
[patch."https://github.com/vizia/vizia.git"]
vizia = { path = "vizia-local" }
vizia_core = { path = "vizia-local/crates/vizia_core" }
vizia_baseview = { path = "vizia-local/crates/vizia_baseview" }
vizia_id = { path = "vizia-local/crates/vizia_id" }
vizia_input = { path = "vizia-local/crates/vizia_input" }
vizia_reactive = { path = "vizia-local/crates/vizia_reactive" }
vizia_storage = { path = "vizia-local/crates/vizia_storage" }
vizia_style = { path = "vizia-local/crates/vizia_style" }
vizia_window = { path = "vizia-local/crates/vizia_window" }
