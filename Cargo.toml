[workspace]
members = [
    "shared-dsp",
    "shared-analysis",
    "shared-vault",
    "shared-ui",
    "shm-hub",
    "lucent",
    "lucent-relay",
    "aether",
    "aurum",
    "equilibrium",
    "meridian",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.shell]
inherits = "release"
