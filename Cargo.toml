[workspace]
members = [
    "shared-dsp",
    "shared-analysis",
    "shared-vault",
    "shared-ui",
    "shm-hub",
    "plugins/lucent",
    "plugins/lucent-relay",
    "plugins/aether",
    "plugins/aurum",
    "plugins/equilibrium",
    "plugins/meridian",
]
resolver = "3"

[workspace.dependencies]
truce           = { version = "1.0.5", default-features = false }
truce-core      = "1.0.5"
truce-params    = "1.0.5"
truce-clap      = "1.0.5"
truce-vst3      = "1.0.5"
truce-loader    = "1.0.5"
truce-iced      = "1.0.5"
truce-standalone = { version = "1.0.5", features = ["gui"] }
truce-test      = "1.0.5"
clap-sys        = "0.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.shell]
inherits = "release"

[patch.crates-io]
truce-clap = { path = "truce-clap-local" }
truce-params = { path = "truce-params-local" }
